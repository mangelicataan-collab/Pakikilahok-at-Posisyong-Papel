<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KASAYSAYAN AT LIPUNAN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,600&family=Lora:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>

  :root{
    --desk: #23211E;
    --desk-2: #171613;
    --paper: #F2ECDA;
    --rule: #D8CFAE;
    --cover: #3E4B3B;
    --cover-dark: #2C362A;
    --foil: #C7A24C;
    --ink: #2C3A55;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse at 50% 15%, rgba(255,255,255,0.05), transparent 55%),
      radial-gradient(ellipse at 50% 50%, var(--desk) 0%, var(--desk-2) 100%);
    font-family: 'Space Mono', monospace;
    color: var(--ink);
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 56px 16px;
  }

  /* ---------- notebook ---------- */
  .notebook-wrap{
    position:relative;
    transform: rotate(-0.6deg);
  }

  .notebook{
    position:relative;
    width: min(94vw, 980px);
    background: var(--cover);
    border-radius: 10px;
    padding: 22px;
    box-shadow:
      0 40px 70px -20px rgba(0,0,0,0.65),
      0 10px 25px -10px rgba(0,0,0,0.5),
      inset 0 0 0 1px rgba(255,255,255,0.04);
  }

  .notebook::before{
    content:"";
    position:absolute; inset:0;
    border-radius:10px;
    background: repeating-linear-gradient(45deg, rgba(0,0,0,0.06) 0 2px, transparent 2px 4px);
    opacity:0.5;
    pointer-events:none;
  }

  .cover-label{
    position:absolute;
    top: -14px;
    left: 32px;
    background: var(--cover-dark);
    color: var(--foil);
    font-family:'Fraunces', serif;
    font-weight:600;
    letter-spacing:0.14em;
    font-size: 11px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 3px;
    box-shadow: 0 6px 14px -6px rgba(0,0,0,0.6);
    z-index: 6;
  }

  .page-dots{
    position:absolute;
    top: -13px;
    right: 32px;
    display:flex;
    gap:6px;
    align-items:center;
    z-index:6;
  }

  .page-dots span{
    width:6px; height:6px;
    border-radius:50%;
    background: rgba(255,255,255,0.25);
    transition: background .25s ease, transform .25s ease;
  }
  .page-dots span.active{
    background: var(--foil);
    transform: scale(1.3);
  }

  .pages{
    position:relative;
    background: var(--paper);
    border-radius: 4px;
    box-shadow:
      inset 0 0 40px rgba(0,0,0,0.08),
      0 2px 10px rgba(0,0,0,0.3);
  }

  /* ---------- 3D flip stage ---------- */
  .flip-stage{
    perspective: 2200px;
    position:relative;
  }

  .spread{
    display:grid;
    grid-template-columns: 1fr 1fr;
    transform-style: preserve-3d;
    transform-origin: center center;
    will-change: transform;
  }

  .spread.no-anim{ transition: none !important; }

  /* darkening sweep while a page is edge-on, for a touch of realism */
  .flip-stage.turning::after{
    content:"";
    position:absolute; inset:0;
    background: rgba(0,0,0,0.18);
    pointer-events:none;
    border-radius:4px;
    z-index:4;
  }

  .page{
    position:relative;
    padding: 26px;
    min-height: 420px;
    background-image: repeating-linear-gradient(
      to bottom, transparent 0px, transparent 31px, var(--rule) 32px
    );
    background-position: 0 10px;
    display:flex;
    flex-direction:column;
  }

  .page.left{ border-radius: 4px 0 0 4px; }
  .page.right{ border-radius: 0 4px 4px 0; }

  .page.left::after, .page.right::after{
    content:"";
    position:absolute; top:0; bottom:0; width:50px;
    pointer-events:none;
  }
  .page.left::after{ right:0; background:linear-gradient(to right, transparent, rgba(0,0,0,0.08)); }
  .page.right::after{ left:0; background:linear-gradient(to left, transparent, rgba(0,0,0,0.08)); }

  /* ---------- spiral binding — sits above the flipping spread, always still ---------- */
  .spine{
    position:absolute;
    top:0; bottom:0; left:50%;
    width: 34px;
    transform: translateX(-50%);
    display:flex;
    flex-direction:column;
    justify-content:space-evenly;
    align-items:center;
    z-index:5;
    pointer-events:none;
  }

  .ring{
    width: 20px; height: 20px;
    border-radius:50%;
    background: linear-gradient(155deg, #cfcfc9, #8b8b85 55%, #55554f);
    box-shadow: 0 2px 3px rgba(0,0,0,0.5), inset 0 0 0 3px var(--desk-2);
  }

  /* ---------- eyebrow (only thing left of the old copy) ---------- */
  .eyebrow{
    font-size: 11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color: var(--ink);
    opacity:0.65;
    margin: 0 0 16px;
  }

  /* ---------- stamp grids ---------- */
  .stamp-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    flex: 1;
    align-content: start;
  }

  .stamp-grid.big-last > :last-child{
    grid-column: 1 / -1;
  }

  .stamp-grid.single-row{
    grid-template-columns: 1fr;
  }

  .stamp{
    position:relative;
    width:100%;
    aspect-ratio: 1 / 1;
    background-image: var(--img);
    background-size: cover;
    background-position: center;
    border-radius: 6px;
    box-shadow: 0 10px 18px -8px rgba(0,0,0,0.4);
    transform: rotate(var(--r, 0deg));
    transition: transform .25s ease, box-shadow .25s ease;
    opacity:0;
    animation: settle .45s cubic-bezier(.2,.9,.25,1) forwards;
    animation-delay: var(--d, 0s);
  }

  .stamp:hover{
    transform: translateY(-5px) rotate(0deg);
    box-shadow: 0 16px 24px -8px rgba(0,0,0,0.45);
  }

  @keyframes settle{
    0%{ opacity:0; transform: scale(1.25) rotate(var(--r,0deg)); }
    100%{ opacity:1; transform: scale(1) rotate(var(--r,0deg)); }
  }

  /* ---------- essay / journal text pages ---------- */
  .essay-text{
    flex:1;
  }

  .essay-text p{
    font-family: 'Lora', serif;
    font-size: 14.5px;
    line-height: 32px;
    color: var(--ink);
    margin: 0 0 32px;
    text-indent: 22px;
  }

  /* ---------- flip nav buttons ---------- */
  .flip-btn{
    position:absolute;
    bottom: -20px;
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    background: var(--cover-dark);
    color: var(--foil);
    font-size: 18px;
    line-height:1;
    cursor:pointer;
    box-shadow: 0 8px 16px -6px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.06);
    z-index: 7;
    display:flex; align-items:center; justify-content:center;
    transition: transform .15s ease, opacity .15s ease;
  }
  .flip-btn:hover{ transform: translateY(-2px); }
  .flip-btn:active{ transform: translateY(0); }
  .flip-btn[disabled]{ opacity:0.35; cursor:default; }
  .flip-btn[disabled]:hover{ transform:none; }

  .flip-prev{ left: -20px; }
  .flip-next{ right: -20px; }

  /* ---------- responsive ---------- */
  @media (max-width: 720px){
    .spread{ grid-template-columns: 1fr; }
    .spine{ display:none; }
    .page.left::after, .page.right::after{ display:none; }
    .page.left{ border-radius: 4px 4px 0 0; border-bottom: 2px dashed var(--rule); }
    .page.right{ border-radius: 0 0 4px 4px; }
    .page{ min-height: unset; padding: 20px; }
  }

  @media (prefers-reduced-motion: reduce){
    .stamp{ animation: none; opacity:1; transform:none; }
    .stamp:hover{ transform:none; }
  }

  :focus-visible{ outline: 2px solid var(--foil); outline-offset: 3px; }

</style>
</head>

  // Page 2 — journal entry, week one
  const spread2Left = `
    <p class="eyebrow">Ika-isang Linggo</p>
    <div class="essay-text">
      <p>Ngayong unang linggo pinasulat kami ni binibini ng makasaysayang kwento na naranasan namin at kung paano namin ito hinarap na kung saan nagkaroon kami ng pagkakataon na di lang ibahagi ito kundi nagkaroon din kami ng pagkakataon na kilalanin ang isat isa gamit ang mga karanasang ito. Dito napagtanto namin ang kahalagahan ng bahagi ng isang kwento na kahit magkakaiba kami ay parehas parin ang mga paraan ng aming pagsulat ng simula, gitna o wakas. Pinapili din kami nga mga personalidad na sa tingin namin ay sumasalamin samin, isinulat namin ito sa 1/4 kung saan sa harap ang pangalan ng personalidad at sa likod ang kapareho naming katangian sa personalidad na iyon. Panghuli nagkaroon din kami ng pagkakataong ipakilala ang aming pangkat sa pamamagitan ng yell.</p>
      <p>Ngunit di maitatanggi ang aking pagkukulang pagdating sa pagbabahagi ng aking kwento dahil di ako ganun ka kaportableng ibahagi ito, nagkaroon din ako at ang aking pangkat ng pagkukulang sa pagisip ng mga salitang ilalagay sa aming yell kung kaya't di kami natapos.</p>
    </div>`;

  const spread2Right = `
    <div class="essay-text">
      <p>Sa kabila nito masasabi ko naman na kahit di ako nakabahagi ng aking kwento sa madaming bahagi ng aking kamag-aral, nakipagbiruan naman ako sa kanila at tumulong na manghikayat sa mga transferee lalo na ang mga mahiyain na magbahagi ng kanilang kwento.</p>
      <p>Bilang pagtatapos, natutunan ko na bawat kwento ay parte ng kasaysayan at di lang ang mga taong tinatawag nating mga "bayani" pati kaming mga estudyante ay may kabuluhan at may papel sa kasaysayan.</p>
    </div>`;

  // Page 3 — journal entry, week two
  const spread3Left = `
    <p class="eyebrow">Ikalawang Linggo</p>
    <div class="essay-text">
      <p>Ngayong ikalawang linggo nagkaroon kami ng pagkakataong "bumawi" sa pagpresenta ng aming yell. Nagkaroon kami ng pangkatang gawain kung saan "bumisita" kami sa dalawang museo, pumili kami ng sining at ito ay aming ginawan ng presentasyon kung saan gumawa kami ng adaptation ng isa sa mga palabas ng lizken kung saan ako si Liza at si Abcde si Enrike na sumasagot sa apat na tanong ng apat na historayador na sina Zaide, Ocampo, Salazar at Agoncillo.</p>
      <p>Ngunit di ko maikakaila ang aking mga pagkukulang pagdating sa aking boses dahil paos ako nung araw na iyon kaya di msaydong aayos ang aking pagpresenta, lumampas din kami sa takdang oras dahil masyadong kiligin ang ibang pangkat.</p>
    </div>`;

  const spread3Right = `
    <div class="essay-text">
      <p>Sa kabilang banda, kahit di natapos ay nasagot naman namin ang apat na tanong ng mga piling historyador.</p>
      <p>Sa makatuwid masasabi ko na hindi lang ito angkop sa kasaysayan kundi pati na rin sa pang araw araw na buhay natin, tulad na lamang sa mga marites ngayon, ang detalye, pananaw, paraan ng pagkwento at aral ay importante dahil maaari itong magbunga ng hindi pagkakaintindihan.</p>
    </div>`;

  const spreads = [
    { left: spread1Left, right: spread1Right },
    { left: spread2Left, right: spread2Right },
    { left: spread3Left, right: spread3Right }
  ];

  let current = 0;
  let flipping = false;

  const pageLeft  = document.getElementById('pageLeft');
  const pageRight = document.getElementById('pageRight');
  const spreadEl  = document.getElementById('spread');
  const stage     = document.getElementById('flipStage');
  const prevBtn   = document.getElementById('prevBtn');
  const nextBtn   = document.getElementById('nextBtn');
  const dots      = document.querySelectorAll('#pageDots span');

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function render(i){
    pageLeft.innerHTML  = spreads[i].left;
    pageRight.innerHTML = spreads[i].right;
    dots.forEach((d, idx) => d.classList.toggle('active', idx === i));
    prevBtn.disabled = i === 0;
    nextBtn.disabled = i === spreads.length - 1;
  }

  function goTo(next){
    if (flipping || next < 0 || next >= spreads.length || next === current) return;

    if (reduceMotion){
      current = next;
      render(current);
      return;
    }

    flipping = true;
    stage.classList.add('turning');
    const dir = next > current ? 1 : -1;

    spreadEl.classList.remove('no-anim');
    spreadEl.style.transition = 'transform .35s ease-in';
    spreadEl.style.transform  = `rotateY(${dir * -92}deg)`;

    setTimeout(() => {
      current = next;
      render(current);

      spreadEl.classList.add('no-anim');
      spreadEl.style.transform = `rotateY(${dir * 92}deg)`;

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          spreadEl.classList.remove('no-anim');
          spreadEl.style.transition = 'transform .35s ease-out';
          spreadEl.style.transform  = 'rotateY(0deg)';
        });
      });

      setTimeout(() => {
        flipping = false;
        stage.classList.remove('turning');
      }, 360);
    }, 350);
  }

  prevBtn.addEventListener('click', () => goTo(current - 1));
  nextBtn.addEventListener('click', () => goTo(current + 1));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') goTo(current + 1);
    if (e.key === 'ArrowLeft')  goTo(current - 1);
  });

  render(current);
</script>

</body>
